<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>समास-यन्त्रम् v2 — Sanskrit Samasa Generator</title>

<!--
  ═══════════════════════════════════════════════════════════════════════
   STEP 1: Link your dictionary file here.
   
   After running:  python3 dict_builder.py shabdakosha.json shabdakosha_lookup.json
   
   Rename the output:  shabdakosha_lookup.json  →  data.js
   
   Open data.js in a text editor and add this line at the very top:
       const SHABDAKOSHA =
   
   So the file looks like:
       const SHABDAKOSHA = {"रामस्य":{"r":"राम","v":"6",...}, ...}
   
   Place data.js in the SAME folder as this index.html file.
  ═══════════════════════════════════════════════════════════════════════
-->
<script src="data.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════════
   DESIGN SYSTEM
   ═══════════════════════════════════════════════════════════════════ */

:root {
  --sand-50: #FDFCF9; --sand-100: #FAF8F3; --sand-200: #F5F3EE;
  --sand-300: #E8E3D9; --sand-400: #D4CFC2; --sand-500: #B5AFA2;
  --sand-600: #8B7E6A; --sand-700: #6B5D4A; --sand-800: #3D3929;
  --sand-900: #2A2519;
  --copper-400: #C4956A; --copper-500: #B8794A; --copper-600: #96623D;
  --copper-700: #7A4E30; --copper-800: #5C3D1E;
  --green-50: #F0FDF4; --green-100: #D1FAE5; --green-200: #BBF7D0;
  --green-600: #166534; --green-700: #065F46;
  --amber-50: #FEF3C7; --amber-200: #FCD34D; --amber-700: #92400E;
  --blue-50: #DBEAFE; --blue-200: #93C5FD; --blue-700: #1E40AF;
  --pink-50: #FCE7F3; --pink-200: #F9A8D4; --pink-700: #9D174D;
  --red-50: #FEE2E2; --red-200: #FCA5A5; --red-700: #991B1B;
  --gray-50: #F3F4F6; --gray-200: #D1D5DB; --gray-700: #374151;
  --font: 'Noto Sans Devanagari', 'Noto Sans', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: linear-gradient(170deg, #F7F4ED 0%, #EDE8DD 40%, #F2EFE6 100%);
  color: var(--sand-800);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Outer structure ── */

.app-shell {
  max-width: 660px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── Header ── */

.header { text-align: center; padding-bottom: 18px; }
.header-kicker {
  font-size: 11px; letter-spacing: 3px; color: var(--sand-500);
  font-weight: 500; text-transform: uppercase; margin-bottom: 6px;
}
.header h1 { font-size: 30px; font-weight: 700; color: var(--sand-900); line-height: 1.2; }
.header-sub { font-size: 13px; color: var(--sand-600); margin-top: 4px; }
.dict-badge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 5px 14px; border-radius: 8px;
  background: var(--green-50); border: 1px solid var(--green-200);
  font-size: 12px; color: var(--green-600); font-weight: 500;
}
.dict-badge.error { background: var(--red-50); border-color: var(--red-200); color: var(--red-700); }

/* ── Examples ── */

.examples-section { margin-bottom: 18px; }
.examples-label { font-size: 12px; color: var(--sand-500); font-weight: 500; margin-bottom: 8px; letter-spacing: .5px; }
.examples-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.ex-btn {
  padding: 8px 14px; border: 1.5px solid var(--sand-300); border-radius: 10px;
  background: var(--sand-50); cursor: pointer; transition: all .2s;
  font-size: 13px; font-family: var(--font); color: var(--sand-700);
}
.ex-btn:hover {
  border-color: var(--copper-400); background: #FDF8F0;
  transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.06);
}
.ex-btn b { font-weight: 600; }
.ex-tag {
  margin-left: 6px; font-size: 10px; padding: 1px 6px;
  border-radius: 4px; font-weight: 600;
}

/* ── Input panel ── */

.input-panel {
  background: var(--sand-100); border: 1.5px solid var(--sand-300);
  border-radius: 16px; padding: 22px; margin-bottom: 22px;
}
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.input-label { display: block; font-size: 12px; font-weight: 600; color: var(--sand-600); margin-bottom: 6px; }
.input-field {
  width: 100%; padding: 14px 16px; font-size: 18px; font-family: var(--font);
  border: 2px solid var(--sand-300); border-radius: 12px; background: var(--sand-50);
  color: var(--sand-800); outline: none; transition: border .2s, box-shadow .2s;
}
.input-field:focus { border-color: var(--copper-400); box-shadow: 0 0 0 3px rgba(196,149,106,.18); }
.input-field::placeholder { color: var(--sand-500); }
.btn-row { display: flex; justify-content: center; margin-top: 18px; }
.btn-generate {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 36px; font-size: 17px; font-weight: 600; font-family: var(--font);
  color: #FFF; background: linear-gradient(135deg, var(--copper-500) 0%, var(--copper-600) 100%);
  border: none; border-radius: 12px; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(150,98,61,.3);
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(150,98,61,.4); }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ── Steps ── */

.steps-container { display: flex; flex-direction: column; gap: 0; }

.step-wrapper { opacity: 0; transform: translateY(18px); transition: opacity .5s ease, transform .5s ease; }
.step-wrapper.visible { opacity: 1; transform: translateY(0); }

.step-card {
  background: var(--sand-50); border: 1.5px solid var(--sand-300);
  border-radius: 14px; padding: 16px 18px;
}
.step-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
.step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: #EDE5D8; color: var(--sand-700); font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.step-title { font-size: 16px; font-weight: 700; color: var(--sand-800); }
.step-subtitle { font-size: 12px; color: var(--sand-500); }
.step-body { display: flex; flex-direction: column; align-items: center; gap: 10px; }

.step-arrow { display: flex; justify-content: center; padding: 4px 0; color: var(--copper-400); font-size: 20px; opacity: .6; }

/* ── Word boxes, chips, badges ── */

.word-box {
  display: inline-block; padding: 6px 18px; background: #FFF;
  border: 2px solid var(--sand-300); border-radius: 10px;
  font-size: 22px; font-weight: 700;
}
.word-join { display: flex; align-items: center; justify-content: center; gap: 14px; font-size: 22px; font-weight: 600; flex-wrap: wrap; }
.word-join .plus { color: var(--copper-400); font-size: 26px; font-weight: 400; }

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  display: inline-flex; gap: 5px; align-items: center; padding: 4px 10px;
  border-radius: 8px; font-size: 12px; background: var(--sand-200);
  border: 1px solid var(--sand-300); color: var(--sand-700);
}
.chip-label { font-weight: 500; opacity: .7; }
.chip-value { font-weight: 700; }

.source-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 9px; font-size: 13px;
  font-weight: 600; border: 1.5px solid;
}
.source-badge.dict { background: var(--green-100); color: var(--green-700); border-color: var(--green-200); }
.source-badge.regex { background: var(--amber-50); color: var(--amber-700); border-color: var(--amber-200); }
.source-badge.unknown { background: var(--red-50); color: var(--red-700); border-color: var(--red-200); }

.sandhi-tag {
  display: inline-block; padding: 4px 12px; border-radius: 7px;
  font-size: 13px; font-weight: 600; border: 1px solid;
}
.rule-tag {
  display: inline-block; padding: 4px 10px; border-radius: 7px;
  font-size: 12px; font-weight: 500; background: var(--sand-200);
  border: 1px solid var(--sand-300); color: var(--sand-700);
}

.transform-row {
  display: flex; align-items: center; gap: 10px; font-size: 18px; flex-wrap: wrap; justify-content: center;
}
.struck { color: var(--sand-500); text-decoration: line-through; font-size: 18px; }
.arrow-sym { color: var(--copper-400); font-weight: 700; font-size: 20px; }
.extracted {
  font-size: 22px; font-weight: 700; color: var(--sand-700);
  background: var(--amber-50); padding: 2px 14px; border-radius: 8px;
}
.sandhi-result { font-weight: 700; color: var(--copper-600); font-size: 20px; }

/* ── Final result ── */

.final-card {
  background: linear-gradient(135deg, #FDF8F0 0%, #F9F0E3 100%);
  border: 2px solid #D4B896; border-radius: 16px; padding: 26px 22px; text-align: center;
}
.final-kicker { font-size: 12px; font-weight: 500; color: var(--sand-500); letter-spacing: 1px; margin-bottom: 4px; }
.final-word {
  font-size: 40px; font-weight: 700; color: var(--copper-800);
  letter-spacing: 1px; line-height: 1.3; padding: 8px 0;
}
.final-trail { font-size: 13px; color: var(--sand-500); margin-top: 4px; }
.final-info {
  margin-top: 14px; padding: 10px 16px; background: #FFF9F0;
  border-radius: 10px; border: 1px solid #EDE5D8;
  font-size: 13px; color: var(--sand-700); line-height: 1.6;
}
.final-info b { font-weight: 700; }
.final-source-tag {
  margin-left: 8px; font-size: 11px; padding: 2px 8px;
  border-radius: 4px; font-weight: 600;
}

/* ── Responsive ── */
@media (max-width: 500px) {
  .input-grid { grid-template-columns: 1fr; }
  .final-word { font-size: 32px; }
  .word-box { font-size: 18px; padding: 5px 12px; }
}
</style>
</head>

<body>
<div class="app-shell">

  <!-- Header -->
  <div class="header">
    <div class="header-kicker">संस्कृत-व्याकरणम्</div>
    <h1>समास-यन्त्रम् v2</h1>
    <div class="header-sub">Tatpurusha Samasa Generator — Dictionary + Regex Hybrid</div>
    <div id="dictBadge" class="dict-badge">Loading...</div>
  </div>

  <!-- Examples -->
  <div class="examples-section">
    <div class="examples-label">उदाहरणानि — Try these:</div>
    <div class="examples-grid" id="examplesGrid"></div>
  </div>

  <!-- Input panel -->
  <div class="input-panel">
    <div class="input-grid">
      <div>
        <label class="input-label">पूर्वपदम् (with विभक्ति)</label>
        <input class="input-field" id="word1" placeholder="रामस्य" autocomplete="off">
      </div>
      <div>
        <label class="input-label">उत्तरपदम्</label>
        <input class="input-field" id="word2" placeholder="आलयः" autocomplete="off">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-generate" id="btnGenerate" disabled>समासं कुरु</button>
    </div>
  </div>

  <!-- Results container -->
  <div class="steps-container" id="stepsContainer"></div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   DICTIONARY DETECTION
   ═══════════════════════════════════════════════════════════════════════ */

const dictAvailable = (typeof SHABDAKOSHA !== 'undefined') && SHABDAKOSHA !== null;
const dictSize = dictAvailable ? Object.keys(SHABDAKOSHA).length : 0;

(function initBadge() {
  const el = document.getElementById('dictBadge');
  if (dictAvailable && dictSize > 0) {
    el.textContent = '📖 शब्दकोश: ' + dictSize.toLocaleString() + ' forms loaded';
    el.classList.remove('error');
  } else {
    el.textContent = '⚠ data.js not found — using regex-only mode';
    el.classList.add('error');
  }
})();


/* ═══════════════════════════════════════════════════════════════════════
   STEP A: DICTIONARY LOOKUP — O(1)
   ═══════════════════════════════════════════════════════════════════════ */

const VNAMES = {"1":"प्रथमा","2":"द्वितीया","3":"तृतीया","4":"चतुर्थी","5":"पञ्चमी","6":"षष्ठी","7":"सप्तमी","8":"सम्बोधनम्"};
const NNAMES = {"1":"एकवचनम्","2":"द्विवचनम्","3":"बहुवचनम्"};
const LFULL = {"पुं":"पुंल्लिङ्गम्","स्त्री":"स्त्रीलिङ्गम्","नपुं":"नपुंसकलिङ्गम्"};

function dictLookup(word) {
  if (!dictAvailable) return null;
  const e = SHABDAKOSHA[word];
  if (!e) return null;
  return {
    inputWord: word,
    pratipadika: e.r,
    vibhakti: VNAMES[e.v] || e.v,
    vachana: NNAMES[e.n] || e.n,
    karanta: e.k + '-कारान्त',
    gender: e.g,
    source: 'शब्दकोश',
  };
}


/* ═══════════════════════════════════════════════════════════════════════
   STEP B: REGEX FALLBACK — 9 कारान्त types
   ═══════════════════════════════════════════════════════════════════════ */

const RULES = [
  [/ानम्$/, 'द्वितीया', 'न्', 'अन्-अन्त'],
  [/्ञा$/, 'तृतीया', 'न्', 'अन्-अन्त'],
  [/्ञे$/, 'चतुर्थी', 'न्', 'अन्-अन्त'],
  [/्ञः$/, 'पञ्चमी/षष्ठी', 'न्', 'अन्-अन्त'],
  [/्ञि$/, 'सप्तमी', 'न्', 'अन्-अन्त'],
  [/(?<![िु])ना$/, 'तृतीया', 'न्', 'अन्-अन्त'],
  [/ने$/, 'चतुर्थी', 'न्', 'अन्-अन्त'],
  [/नः$/, 'पञ्चमी/षष्ठी', 'न्', 'अन्-अन्त'],
  [/नि$/, 'सप्तमी', 'न्', 'अन्-अन्त'],
  [/सा$/, 'तृतीया', 'स्', 'अस्-अन्त'],
  [/से$/, 'चतुर्थी', 'स्', 'अस्-अन्त'],
  [/सः$/, 'पञ्चमी/षष्ठी', 'स्', 'अस्-अन्त'],
  [/सि$/, 'सप्तमी', 'स्', 'अस्-अन्त'],
  [/रम्$/, 'द्वितीया', 'ृ', 'ऋ-कारान्त'],
  [/्रा$/, 'तृतीया', 'ृ', 'ऋ-कारान्त'],
  [/्रे$/, 'चतुर्थी', 'ृ', 'ऋ-कारान्त'],
  [/रि$/, 'सप्तमी', 'ृ', 'ऋ-कारान्त'],
  [/्याम्$/, 'सप्तमी', 'ी', 'ई-कारान्त'],
  [/्याः$/, 'पञ्चमी/षष्ठी', 'ी', 'ई-कारान्त'],
  [/्यै$/, 'चतुर्थी', 'ी', 'ई-कारान्त'],
  [/्या$/, 'तृतीया', 'ी', 'ई-कारान्त'],
  [/ीम्$/, 'द्वितीया', 'ी', 'ई-कारान्त'],
  [/्वाम्$/, 'सप्तमी', 'ू', 'ऊ-कारान्त'],
  [/्वाः$/, 'पञ्चमी/षष्ठी', 'ू', 'ऊ-कारान्त'],
  [/्वै$/, 'चतुर्थी', 'ू', 'ऊ-कारान्त'],
  [/्वा$/, 'तृतीया', 'ू', 'ऊ-कारान्त'],
  [/ूम्$/, 'द्वितीया', 'ू', 'ऊ-कारान्त'],
  [/ायाम्$/, 'सप्तमी', 'ा', 'आ-कारान्त'],
  [/ायाः$/, 'पञ्चमी/षष्ठी', 'ा', 'आ-कारान्त'],
  [/ायै$/, 'चतुर्थी', 'ा', 'आ-कारान्त'],
  [/या$/, 'तृतीया', 'ा', 'आ-कारान्त'],
  [/ाम्$/, 'द्वितीया', 'ा', 'आ-कारान्त'],
  [/िम्$/, 'द्वितीया', 'ि', 'इ-कारान्त'],
  [/(िना|िणा)$/, 'तृतीया', 'ि', 'इ-कारान्त'],
  [/ये$/, 'चतुर्थी', 'ि', 'इ-कारान्त'],
  [/ेः$/, 'पञ्चमी/षष्ठी', 'ि', 'इ-कारान्त'],
  [/ुम्$/, 'द्वितीया', 'ु', 'उ-कारान्त'],
  [/(ुना|ुणा)$/, 'तृतीया', 'ु', 'उ-कारान्त'],
  [/(?<![ा-्])वे$/, 'चतुर्थी', 'ु', 'उ-कारान्त'],
  [/ोः$/, 'पञ्चमी/षष्ठी', 'ु', 'उ-कारान्त'],
  [/स्य$/, 'षष्ठी', '', 'अ-कारान्त'],
  [/(ेन|ेण)$/, 'तृतीया', '', 'अ-कारान्त'],
  [/ाय$/, 'चतुर्थी', '', 'अ-कारान्त'],
  [/ात्$/, 'पञ्चमी', '', 'अ-कारान्त'],
  [/े$/, 'सप्तमी', '', 'अ-कारान्त'],
  [/म्$/, 'द्वितीया', '', 'अ-कारान्त'],
];

function regexFallback(word) {
  if (/ौ$/.test(word)) {
    var stem = word.replace(/ौ$/, '');
    var isU = /ु/.test(stem);
    return { inputWord: word, pratipadika: stem + (isU ? 'ु' : 'ि'), karanta: (isU ? 'उ' : 'इ') + '-कारान्त', vibhakti: 'सप्तमी', source: 'नियम' };
  }
  if (/ुः$/.test(word)) {
    var stem = word.replace(/ुः$/, '');
    return { inputWord: word, pratipadika: stem + 'ृ', karanta: 'ऋ-कारान्त', vibhakti: 'पञ्चमी/षष्ठी', source: 'नियम' };
  }
  for (var i = 0; i < RULES.length; i++) {
    var r = RULES[i];
    if (r[0].test(word)) {
      return { inputWord: word, pratipadika: word.replace(r[0], r[2]), karanta: r[3], vibhakti: r[1], source: 'नियम' };
    }
  }
  return { inputWord: word, pratipadika: word, karanta: 'अज्ञात', vibhakti: '—', source: 'अज्ञात', error: true };
}


/* ═══════════════════════════════════════════════════════════════════════
   MAIN: Dictionary first → Regex fallback
   ═══════════════════════════════════════════════════════════════════════ */

function extractPratipadika(word) {
  var w = word.trim();
  var d = dictLookup(w);
  if (d) return d;
  return regexFallback(w);
}


/* ═══════════════════════════════════════════════════════════════════════
   SANDHI ENGINE
   ═══════════════════════════════════════════════════════════════════════ */

var V2M = {'अ':'','आ':'ा','इ':'ि','ई':'ी','उ':'ु','ऊ':'ू','ऋ':'ृ','ए':'े','ऐ':'ै','ओ':'ो','औ':'ौ'};
var MATRAS = ['ि','ी','ु','ू','ृ','े','ै','ो','ौ','्'];

function hasMatra(p) { for (var i = 0; i < MATRAS.length; i++) { if (p.endsWith(MATRAS[i])) return true; } return false; }

function yanSandhi(base, sv, u) {
  var fc = u[0], rest = u.slice(1);
  if (fc in V2M) return base + '्' + sv + V2M[fc] + rest;
  return base + '्' + sv + u;
}

function identifySandhiType(p, u) {
  var em = hasMatra(p);
  var V = 'अआइईउऊऋएऐओऔ';
  var fc = u[0];
  if (!V.includes(fc)) return { type: 'संयोगः', nameSa: 'संयोगमात्रम् (सन्धिः नास्ति)', rule: '' };
  if (!em) {
    if ('अआ'.includes(fc)) return { type: 'सवर्णदीर्घ', nameSa: 'सवर्णदीर्घ-सन्धिः', rule: 'अ/आ + अ/आ → आ' };
    if ('इई'.includes(fc)) return { type: 'गुण', nameSa: 'गुण-सन्धिः', rule: 'अ/आ + इ/ई → ए' };
    if ('उऊ'.includes(fc)) return { type: 'गुण', nameSa: 'गुण-सन्धिः', rule: 'अ/आ + उ/ऊ → ओ' };
    if (fc === 'ऋ') return { type: 'गुण', nameSa: 'गुण-सन्धिः', rule: 'अ/आ + ऋ → अर्' };
    if ('एऐ'.includes(fc)) return { type: 'वृद्धि', nameSa: 'वृद्धि-सन्धिः', rule: 'अ/आ + ए/ऐ → ऐ' };
    if ('ओऔ'.includes(fc)) return { type: 'वृद्धि', nameSa: 'वृद्धि-सन्धिः', rule: 'अ/आ + ओ/औ → औ' };
  } else if (p.endsWith('ि') || p.endsWith('ी')) {
    if ('इई'.includes(fc)) return { type: 'सवर्णदीर्घ', nameSa: 'सवर्णदीर्घ-सन्धिः', rule: 'इ/ई + इ/ई → ई' };
    return { type: 'यण्', nameSa: 'यण्-सन्धिः', rule: 'इ/ई + स्वरः → य्' };
  } else if (p.endsWith('ु') || p.endsWith('ू')) {
    if ('उऊ'.includes(fc)) return { type: 'सवर्णदीर्घ', nameSa: 'सवर्णदीर्घ-सन्धिः', rule: 'उ/ऊ + उ/ऊ → ऊ' };
    return { type: 'यण्', nameSa: 'यण्-सन्धिः', rule: 'उ/ऊ + स्वरः → व्' };
  } else if (p.endsWith('ृ')) {
    if (fc === 'ऋ') return { type: 'सवर्णदीर्घ', nameSa: 'सवर्णदीर्घ-सन्धिः', rule: 'ऋ + ऋ → ॠ' };
    return { type: 'यण्', nameSa: 'यण्-सन्धिः', rule: 'ऋ + स्वरः → र्' };
  }
  return { type: 'संयोगः', nameSa: 'संयोगमात्रम्', rule: '' };
}

function applySandhi(p, u) {
  var em = hasMatra(p);
  if (!em) {
    var b = p.endsWith('ा') ? p.slice(0, -1) : p;
    if (u[0]==='अ'||u[0]==='आ') return b+'ा'+u.slice(1);
    if (u[0]==='इ'||u[0]==='ई') return b+'े'+u.slice(1);
    if (u[0]==='उ'||u[0]==='ऊ') return b+'ो'+u.slice(1);
    if (u[0]==='ऋ') return b+'र्'+u.slice(1);
    if (u[0]==='ए'||u[0]==='ऐ') return b+'ै'+u.slice(1);
    if (u[0]==='ओ'||u[0]==='औ') return b+'ौ'+u.slice(1);
  } else if (p.endsWith('ि')||p.endsWith('ी')) {
    var b=p.slice(0,-1);
    if (u[0]==='इ'||u[0]==='ई') return b+'ी'+u.slice(1);
    return yanSandhi(b,'य',u);
  } else if (p.endsWith('ु')||p.endsWith('ू')) {
    var b=p.slice(0,-1);
    if (u[0]==='उ'||u[0]==='ऊ') return b+'ू'+u.slice(1);
    return yanSandhi(b,'व',u);
  } else if (p.endsWith('ृ')) {
    var b=p.slice(0,-1);
    if (u[0]==='ऋ') return b+'ॄ'+u.slice(1);
    return yanSandhi(b,'र',u);
  }
  return p+u;
}


/* ═══════════════════════════════════════════════════════════════════════
   FULL PIPELINE
   ═══════════════════════════════════════════════════════════════════════ */

function generateSamasa(w1, w2) {
  var ext = extractPratipadika(w1);
  var si = identifySandhiType(ext.pratipadika, w2);
  var result = applySandhi(ext.pratipadika, w2);
  return { extraction: ext, sandhiInfo: si, samastapada: result, pratipadika: ext.pratipadika, uttarapada: w2 };
}


/* ═══════════════════════════════════════════════════════════════════════
   SANDHI COLOR MAP
   ═══════════════════════════════════════════════════════════════════════ */

var SC = {
  'सवर्णदीर्घ': { bg: 'var(--amber-50)', text: 'var(--amber-700)', border: 'var(--amber-200)' },
  'गुण':        { bg: 'var(--blue-50)',  text: 'var(--blue-700)',  border: 'var(--blue-200)' },
  'वृद्धि':    { bg: 'var(--pink-50)',  text: 'var(--pink-700)',  border: 'var(--pink-200)' },
  'यण्':       { bg: 'var(--green-100)', text: 'var(--green-700)', border: 'var(--green-200)' },
  'संयोगः':    { bg: 'var(--gray-50)',  text: 'var(--gray-700)',  border: 'var(--gray-200)' },
};

function getSC(type) { return SC[type] || SC['संयोगः']; }


/* ═══════════════════════════════════════════════════════════════════════
   UI RENDERING
   ═══════════════════════════════════════════════════════════════════════ */

var EXAMPLES = [
  { p: 'रामस्य', u: 'आलयः', label: 'रामालयः', type: 'सवर्णदीर्घ' },
  { p: 'हरिणा', u: 'ईश्वरः', label: 'हरीश्वरः', type: 'सवर्णदीर्घ' },
  { p: 'रामेण', u: 'इन्द्रः', label: 'रामेन्द्रः', type: 'गुण' },
  { p: 'विद्यायाः', u: 'अर्थी', label: 'विद्यार्थी', type: 'सवर्णदीर्घ' },
  { p: 'गुरोः', u: 'आदेशः', label: 'गुर्वादेशः', type: 'यण्' },
  { p: 'पितुः', u: 'आदेशः', label: 'पित्रादेशः', type: 'यण्' },
  { p: 'रामाय', u: 'गतः', label: 'रामगतः', type: 'संयोगः' },
];

// Build example buttons
(function buildExamples() {
  var grid = document.getElementById('examplesGrid');
  EXAMPLES.forEach(function(ex) {
    var btn = document.createElement('button');
    btn.className = 'ex-btn';
    var sc = getSC(ex.type);
    btn.innerHTML = '<b>' + ex.label + '</b><span class="ex-tag" style="background:' + sc.bg + ';color:' + sc.text + '">' + ex.type + '</span>';
    btn.onclick = function() {
      document.getElementById('word1').value = ex.p;
      document.getElementById('word2').value = ex.u;
      updateBtn();
      document.getElementById('stepsContainer').innerHTML = '';
    };
    grid.appendChild(btn);
  });
})();

// Button enable/disable
var w1El = document.getElementById('word1');
var w2El = document.getElementById('word2');
var btnEl = document.getElementById('btnGenerate');

function updateBtn() { btnEl.disabled = !(w1El.value.trim() && w2El.value.trim()); }
w1El.addEventListener('input', function() { updateBtn(); document.getElementById('stepsContainer').innerHTML = ''; });
w2El.addEventListener('input', function() { updateBtn(); document.getElementById('stepsContainer').innerHTML = ''; });
w1El.addEventListener('keydown', function(e) { if (e.key === 'Enter') runGenerate(); });
w2El.addEventListener('keydown', function(e) { if (e.key === 'Enter') runGenerate(); });
btnEl.addEventListener('click', runGenerate);

var isAnimating = false;

function runGenerate() {
  if (isAnimating || !w1El.value.trim() || !w2El.value.trim()) return;
  var r = generateSamasa(w1El.value.trim(), w2El.value.trim());
  renderSteps(r);
}


/* ═══════════════════════════════════════════════════════════════════════
   STEP RENDERER — builds HTML and animates steps sequentially
   ═══════════════════════════════════════════════════════════════════════ */

function renderSteps(r) {
  var container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  isAnimating = true;
  btnEl.disabled = true;

  var ext = r.extraction;
  var si = r.sandhiInfo;
  var sc = getSC(si.type);

  // Source badge HTML
  var srcClass = ext.source === 'शब्दकोश' ? 'dict' : (ext.source === 'नियम' ? 'regex' : 'unknown');
  var srcIcon = ext.source === 'शब्दकोश' ? '📖' : (ext.source === 'नियम' ? '⚙' : '?');
  var srcLabel = ext.source === 'शब्दकोश' ? 'शब्दकोश (Exact Match)' : (ext.source === 'नियम' ? 'नियम (Regex Fallback)' : 'अज्ञात');

  // Extra chips for dictionary results
  var extraChips = '';
  if (ext.vachana) extraChips += chip('वचनम्', ext.vachana);
  if (ext.gender) extraChips += chip('लिङ्गम्', LFULL[ext.gender] || ext.gender);

  var finalSourceTag = ext.source === 'शब्दकोश'
    ? '<span class="final-source-tag" style="background:var(--green-100);color:var(--green-700)">📖 Dict verified</span>'
    : '<span class="final-source-tag" style="background:var(--amber-50);color:var(--amber-700)">⚙ Regex match</span>';

  // Build all 4 step elements
  var steps = [
    // Step 1: Input
    stepWrap(
      stepCard('१', 'प्रदत्तपदानि', 'Input words',
        '<div class="word-join"><span class="word-box">' + ext.inputWord + '</span><span class="plus">+</span><span class="word-box">' + r.uttarapada + '</span></div>'
      )
    ),
    // Step 2: Vibhakti Lopa
    stepWrap(
      stepCard('२', 'विभक्ति-लोपः', 'Case-ending removal',
        '<div class="step-body">' +
          '<div class="source-badge ' + srcClass + '">' + srcIcon + ' ' + srcLabel + '</div>' +
          '<div class="chip-row">' +
            chip('कारान्तः', ext.karanta) +
            chip('विभक्तिः', ext.vibhakti) +
            extraChips +
          '</div>' +
          '<div class="transform-row">' +
            '<span class="struck">' + ext.inputWord + '</span>' +
            '<span class="arrow-sym">→</span>' +
            '<span class="extracted">' + r.pratipadika + '</span>' +
          '</div>' +
        '</div>'
      )
    ),
    // Step 3: Sandhi
    stepWrap(
      stepCard('३', 'सन्धि-प्रक्रिया', 'Sandhi application',
        '<div class="step-body">' +
          '<div class="chip-row">' +
            '<span class="sandhi-tag" style="background:' + sc.bg + ';color:' + sc.text + ';border-color:' + sc.border + '">' + si.nameSa + '</span>' +
            (si.rule ? '<span class="rule-tag">' + si.rule + '</span>' : '') +
          '</div>' +
          '<div class="transform-row">' +
            '<span style="font-weight:600;color:var(--sand-700)">' + r.pratipadika + '</span>' +
            '<span style="color:var(--copper-400)">+</span>' +
            '<span style="font-weight:600;color:var(--sand-700)">' + r.uttarapada + '</span>' +
            '<span class="arrow-sym">→</span>' +
            '<span class="sandhi-result">' + r.samastapada + '</span>' +
          '</div>' +
        '</div>'
      )
    ),
    // Step 4: Final
    stepWrap(
      '<div class="final-card">' +
        '<div class="final-kicker">समस्तपदम्</div>' +
        '<div class="final-word">' + r.samastapada + '</div>' +
        '<div class="final-trail">' + ext.inputWord + ' + ' + r.uttarapada + ' → ' + r.samastapada + '</div>' +
        '<div class="final-info">' +
          '<b>तत्पुरुष-समासः</b>' +
          (ext.vibhakti !== '—' ? ' — ' + ext.vibhakti + '-तत्पुरुषः' : '') +
          (si.type !== 'संयोगः' ? ' · ' + si.nameSa : '') +
          finalSourceTag +
        '</div>' +
      '</div>'
    ),
  ];

  // Insert all steps (hidden)
  steps.forEach(function(html) { container.insertAdjacentHTML('beforeend', html); });

  // Animate them in sequence
  var wrappers = container.querySelectorAll('.step-wrapper');
  var delay = 0;
  wrappers.forEach(function(el, i) {
    delay += 550;
    setTimeout(function() {
      el.classList.add('visible');
      if (i === wrappers.length - 1) {
        isAnimating = false;
        updateBtn();
        setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 150);
      }
    }, delay);
  });
}

// HTML helpers
function stepWrap(inner) {
  return '<div class="step-wrapper">' + inner + '<div class="step-arrow">▼</div></div>';
}

function stepCard(num, title, subtitle, body) {
  return '<div class="step-card">' +
    '<div class="step-header">' +
      '<span class="step-num">' + num + '</span>' +
      '<span class="step-title">' + title + '</span>' +
      '<span class="step-subtitle">' + subtitle + '</span>' +
    '</div>' + body +
  '</div>';
}

function chip(label, value) {
  return '<span class="chip"><span class="chip-label">' + label + ':</span> <span class="chip-value">' + value + '</span></span>';
}
</script>
